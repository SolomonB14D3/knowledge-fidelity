# Operation Frontier — Problem: 2D Point-Vortex Conservation
# Domain: classical fluid mechanics (Kirchhoff 1876)
# Target: hunt for approximate near-invariants beyond the known exact ones

problem:
  name: "vortex_pair_conservation"
  description: |
    2D point-vortex system — simplest reduced fluid model with exact conservation laws.
    Exact conserved: H (Hamiltonian), Lz (angular impulse), Px/Py (linear impulse), Xcm (centroid when Γ_tot≠0).
    Known special case: r₁₂ = const for any 2-vortex system (follows from H + integrability).
    Hunt target: approximate near-invariants for near-equal-circulation vortex merging,
    or for the restricted 3-vortex problem (2 strong + 1 weak test vortex).
    Analog to figure-8: does Z₃ choreographic structure appear in 3-vortex symmetric IC?

  model: "Qwen/Qwen3-4B-Base"
  oracle: "stem_margin"
  verification_set: "vortex_pair_facts.json"
  pass_threshold: 0.8

  monitors:
    - margin_sign                        # always required
    # - energy_violation                 # |H(t)-H(0)|/|H(0)| — integrator sanity
    # - sum_pairwise_distances_variance  # r12+r13+r23 (three_symmetric IC)
    # - e2_symmetric_poly_variance       # r12*r13+r12*r23+r13*r23 (three_symmetric IC)

  # Checker: vortex_checker.py
  # Usage:
  #   python vortex_checker.py --all               # all ICs, all candidates
  #   python vortex_checker.py --ic equal_pair --check H
  #   python vortex_checker.py --ic three_symmetric --expr "s['r12']+s['r13']+s['r23']"
  #   python vortex_checker.py --ic restricted --expr "s['r12']**2 + s['r13']**2"
  #
  # Known results:
  #   equal_pair:      H PASS, Lz PASS, Px PASS, Py PASS, r12 PASS
  #   unequal_pair:    H PASS, Lz PASS, r12 PASS (always constant for N=2)
  #   opposite_pair:   H PASS, r12 PASS (translates at const velocity)
  #   three_symmetric: H PASS, Lz PASS, Px PASS, r12 PASS (rigid rotation)
  #   three_random:    H PASS, Lz PASS, r12 FAIL (chaotic separation)
  #   restricted:      H PASS, Lz PASS, r12 FAIL (test vortex perturbed)
  #
  # Interesting ICs for hunting:
  #   - three_symmetric (equal equilateral): r12+r13+r23 = const (Z₃ rigid rotation → exact)
  #   - restricted: Jacobi-like approximate integral for test vortex?
  #   - unequal_pair: anything beyond H, Lz for the drifting center?

  adapter: null

  reward:
    primary: margin_after_repair
    secondary: frac_var
    knowledge_gap_trigger: -5.0

  budget: "500 steps or 1M tokens"
  destructive_mode: true

  notes: |
    Domain analogs:
    - 2-body vortex ↔ Kepler 2-body (both integrable, both have distance conservation)
    - 3-body vortex (symmetric) ↔ figure-8 choreography (Z₃ symmetry)
    - Restricted 3-vortex ↔ restricted 3-body (Jacobi integral analog)

    Key difference from figure-8:
    - For 3-vortex THREE_SYMMETRIC IC, r12=r13=r23=const EXACTLY (rigid rotation).
      So r12+r13+r23 is trivially conserved, not an interesting near-invariant.
    - Interesting target: 3-vortex NEAR-symmetric — does r12+r13+r23 persist approximately?
    - For RESTRICTED IC: does any simple expression of (r13, r23, r12) approximate an integral?

    Checked candidates (vortex_checker.py, threshold=1e-3):
    C-V01: e1=r12+r13+r23 on three_symmetric IC → PASS frac_var=2.5e-12 (trivially exact — rigid rotation)
    C-V02: e1=r12+r13+r23 on three_random IC   → FAIL frac_var=2.8e-02
    C-V03: r12²+r13²+r23² on restricted IC     → FAIL frac_var=1.1e-01
    C-V04: r13²+r23² on restricted IC           → FAIL frac_var=1.6e-01
    C-V05: r13/r23 on restricted IC             → FAIL frac_var=8.4e-02
    C-V06: r12*r13*r23 on three_symmetric IC    → PASS frac_var=7.4e-12 (trivially exact)
    H - ω*Lz on restricted (ω=Γ/πd²)          → PASS frac_var=8.5e-12 (trivially: linear combo of H, Lz)

    Key physics finding: equilateral triangle is relative equilibrium for ANY circulation values
    (rigid rotation, all rᵢⱼ=const exactly). Needs perturbation to escape trivial conservation.
    Perturbed near-symmetric (Γ=[1,0.9,0.8], pos0[0]+=[0.1,0.05], t=2000):
      e1 frac_var=1.1e-03 (just above threshold), e2=2.2e-03 — interesting near-invariant territory.

    Next interesting targets:
    C-V07: e1 on perturbed equilateral with unequal Γ (near-invariant: frac_var~1e-3)
    C-V08: adiabatic invariant J = ∮ Γ₃ dθ for restricted (test vortex action variable)
    C-V09: r12+r13+r23 on 4-vortex system with Z₄ symmetry?
    C-V10: ratio r12/(r13+r23) on restricted (test vortex position relative to strong pair)

    On Oracle format:
    Use compact symbolic notation. Verbose prose fails (confirmed from pilot + repair runs).
    Best context style: "2D point-vortex system, [brief setup]. Which quantity is [conserved/constant]?"
    Best truth style: "Q = <compact expression> = const" or "Q = <formula>"
